<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Admin User - HRMS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 5px;
            display: none;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .message.show {
            display: block;
        }
        
        .backend-url {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 12px;
            color: #666;
            word-break: break-all;
        }
        
        .backend-url strong {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Create Admin User</h1>
        <p class="subtitle">Create your first admin account to access the HRMS system</p>
        
        <div class="backend-url">
            <strong>Backend URL:</strong> <span id="backendUrl">http://localhost:8082</span>
        </div>
        
        <form id="registerForm">
            <div class="form-group">
                <label for="name">Full Name *</label>
                <input type="text" id="name" name="name" required placeholder="Enter your full name">
            </div>
            
            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required placeholder="Enter your email">
            </div>
            
            <div class="form-group">
                <label for="password">Password *</label>
                <input type="password" id="password" name="password" required placeholder="Enter password (min 6 characters)" minlength="6">
            </div>
            
            <div class="form-group">
                <label for="role">Role *</label>
                <select id="role" name="role" required>
                    <option value="">Select Role</option>
                    <option value="ADMIN">Admin</option>
                    <option value="HR">HR</option>
                    <option value="EMPLOYEE">Employee</option>
                </select>
            </div>
            
            <button type="submit" id="submitBtn">Create Admin User</button>
        </form>
        
        <div id="message" class="message"></div>
    </div>

    <script>
        const BACKEND_URL = 'http://localhost:8082';
        document.getElementById('backendUrl').textContent = BACKEND_URL;
        
        const form = document.getElementById('registerForm');
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('message');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                role: document.getElementById('role').value
            };
            
            // Disable button and show loading
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating User...';
            messageDiv.className = 'message';
            messageDiv.textContent = '';
            
            try {
                const response = await fetch(`${BACKEND_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                
                if (response.ok) {
                    const data = await response.json();
                    messageDiv.className = 'message success show';
                    messageDiv.innerHTML = `
                        <strong>✅ Success!</strong><br>
                        User created successfully!<br>
                        <strong>Email:</strong> ${data.email}<br>
                        <strong>Role:</strong> ${data.role}<br><br>
                        You can now login at: <a href="http://localhost:5173" target="_blank">http://localhost:5173</a>
                    `;
                    form.reset();
                } else {
                    const errorText = await response.text();
                    throw new Error(errorText || 'Registration failed');
                }
            } catch (error) {
                messageDiv.className = 'message error show';
                messageDiv.innerHTML = `
                    <strong>❌ Error!</strong><br>
                    ${error.message}<br><br>
                    <strong>Possible reasons:</strong><br>
                    • Backend is not running<br>
                    • Email already exists<br>
                    • Network error
                `;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Admin User';
            }
        });
    </script>
</body>
</html>

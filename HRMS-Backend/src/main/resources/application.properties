# ===============================
# CORS CONFIGURATION
# ===============================
app.cors.allowedOrigins=http://localhost:5173,https://hrms-frontend-production.vercel.app
# SSL Trust Configuration (for development) - WORKING!
spring.mail.properties.mail.smtp.ssl.trust=*

# ===============================
# THYMELEAF CONFIGURATION
# ===============================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false
spring.mail.properties.mail.smtp.ssl.checkserveridentity=false
spring.mail.properties.mail.smtp.ssl.enable=false
spring.mail.properties.mail.debug=true


# Email Retry Configuration
spring.mail.properties.mail.smtp.retry.count=3
spring.mail.properties.mail.smtp.retry.delay=2000

# Email Template Configuration
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.mime.charset=UTF-8

# ===============================
# ASYNC CONFIGURATION
# ===============================
# Thread Pool for Async Email Processing
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=email-async-

# ===============================

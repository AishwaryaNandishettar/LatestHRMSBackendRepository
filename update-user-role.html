<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update User Role - HRMS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .info-box {
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            padding: 12px 16px;
            margin-bottom: 20px;
            border-radius: 4px;
            font-size: 13px;
            color: #0c5460;
        }

        .role-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-right: 8px;
            margin-bottom: 8px;
        }

        .role-badge.admin { background: #ffebee; color: #c62828; }
        .role-badge.hr { background: #e8f5e9; color: #2e7d32; }
        .role-badge.manager { background: #fff3e0; color: #e65100; }
        .role-badge.employee { background: #e3f2fd; color: #1565c0; }

        .roles-info {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .roles-info h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Update User Role</h1>
        <p class="subtitle">Change user permissions in the HRMS system</p>

        <div class="info-box">
            <strong>⚠️ Important:</strong> This will update the user's role in the database. Make sure the backend is running on <strong>localhost:8080</strong>
        </div>

        <form id="updateRoleForm">
            <div class="form-group">
                <label for="email">User Email</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="user@example.com" 
                    required
                >
            </div>

            <div class="form-group">
                <label for="role">New Role</label>
                <select id="role" name="role" required>
                    <option value="">-- Select Role --</option>
                    <option value="ADMIN">ADMIN - Full system access</option>
                    <option value="HR">HR - Human Resources access</option>
                    <option value="MANAGER">MANAGER - Team management access</option>
                    <option value="EMPLOYEE">EMPLOYEE - Basic employee access</option>
                </select>
            </div>

            <button type="submit" id="submitBtn">
                Update Role
            </button>
        </form>

        <div id="message" class="message"></div>

        <div class="roles-info">
            <h3>Available Roles:</h3>
            <div>
                <span class="role-badge admin">ADMIN</span>
                <span class="role-badge hr">HR</span>
                <span class="role-badge manager">MANAGER</span>
                <span class="role-badge employee">EMPLOYEE</span>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('updateRoleForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const role = document.getElementById('role').value;

            if (!email || !role) {
                showMessage('Please fill in all fields', 'error');
                return;
            }

            // Disable button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Updating...';

            try {
                const response = await fetch('http://localhost:8080/api/employee/update-role', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, role })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage(
                        `✅ Success! Role updated for ${data.email}: ${data.oldRole} → ${data.newRole}`,
                        'success'
                    );
                    form.reset();
                } else {
                    showMessage(`❌ Error: ${data.message || data}`, 'error');
                }
            } catch (error) {
                showMessage(`❌ Network Error: ${error.message}. Make sure backend is running on localhost:8080`, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Update Role';
            }
        });

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';

            if (type === 'success') {
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 5000);
            }
        }
    </script>
</body>
</html>
